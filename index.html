<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador de BI</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <script>
    // =============================
    // CONFIGURAÇÃO
    // =============================

    const BI_URL = "https://app.powerbi.com/view?r=eyJrIjoiMjZmNzczMDgtYWIyNy00NjU4LTg0NWUtMzk0Nzk1YjU4OTc1IiwidCI6ImU4ZGQ5MDEzLTUxNjUtNDVjNi1iYjg5LWVlOTlhZDVlN2VjYiJ9";

    const tempoAtualizacao = 5 * 60 * 1000; // 5 minutos
    const tempoImagem = 3 * 60 * 1000;     // 3 minutos

    let contadorAtualizacoes = 0;

    const container = document.getElementById("container");

    // =============================
    // MOSTRAR BI
    // =============================
    function mostrarBI() {
      container.innerHTML = "";

      const iframe = document.createElement("iframe");

      // força atualização do Power BI (evita travamento)
      iframe.src = BI_URL + "&t=" + new Date().getTime();

      container.appendChild(iframe);

      setTimeout(() => {
        contadorAtualizacoes++;

        // Após 6 ciclos (30 minutos)
        if (contadorAtualizacoes === 6) {
          contadorAtualizacoes = 0;
          return mostrarImagem();
        }

        mostrarBI();
      }, tempoAtualizacao);
    }

    // =============================
    // MOSTRAR IMAGEM
    // =============================
    function mostrarImagem() {
      container.innerHTML = "";

      const img = document.createElement("img");

      img.src = "https://raw.githubusercontent.com/felipedayvid/VisualizacaoBI/main/bebagua.png";

      container.appendChild(img);

      setTimeout(() => {
        mostrarBI();
      }, tempoImagem);
    }

    // =============================
    // INÍCIO
    // =============================
    mostrarBI();
  </script>
</body>
</html>
