<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Rotator</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <script>
    // =============================
    // CONFIGURAÇÃO DOS DASHBOARDS
    // =============================
    const dashboards = [
      {
        src: "https://app.powerbi.com/view?r=eyJrIjoiMjZmNzczMDgtYWIyNy00NjU4LTg0NWUtMzk0Nzk1YjU4OTc1IiwidCI6ImU4ZGQ5MDEzLTUxNjUtNDVjNi1iYjg5LWVlOTlhZDVlN2VjYiJ9"
      },
      {
        src: "https://app.powerbi.com/view?r=eyJrIjoiMWU4OTNmNjYtZTIzZi00MmM1LWE5YmEtYjlkMGRhOGQ0N2EyIiwidCI6ImU4ZGQ5MDEzLTUxNjUtNDVjNi1iYjg5LWVlOTlhZDVlN2VjYiJ9"
      }
    ];

    const tempoDashboard = 5 * 60 * 1000; // 5 minutos
    const tempoImagem = 1 * 60 * 1000;    // 1 minuto

    // =============================
    // CONTROLE DE ESTADO
    // =============================
    let index = 0;
    let ciclosCompletos = 0;

    const container = document.getElementById("container");

    // =============================
    // MOSTRAR DASHBOARD
    // =============================
    function mostrarDashboard() {
      container.innerHTML = "";

      const iframe = document.createElement("iframe");

      // Evita cache travado do Power BI
      iframe.src = dashboards[index].src + "&t=" + new Date().getTime();

      container.appendChild(iframe);

      setTimeout(() => {
        index++;

        // terminou um ciclo completo?
        if (index >= dashboards.length) {
          index = 0;
          ciclosCompletos++;

          // a cada 3 ciclos (30 minutos)
          if (ciclosCompletos === 3) {
            ciclosCompletos = 0;
            return mostrarImagem();
          }
        }

        mostrarDashboard();
      }, tempoDashboard);
    }

    // =============================
    // MOSTRAR IMAGEM
    // =============================
    function mostrarImagem() {
      container.innerHTML = "";

      const img = document.createElement("img");
      img.src = "bebagua.png";

      container.appendChild(img);

      setTimeout(() => {
        mostrarDashboard();
      }, tempoImagem);
    }

    // =============================
    // INÍCIO
    // =============================
    mostrarDashboard();
  </script>
</body>
</html>
