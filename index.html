<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador de BI</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <script>
    // =============================
    // CONFIGURAÇÃO
    // =============================
    const BI_URL = "https://app.powerbi.com/view?r=eyJrIjoiMjZmNzczMDgtYWIyNy00NjU4LTg0NWUtMzk0Nzk1YjU4OTc1IiwidCI6ImU4ZGQ5MDEzLTUxNjUtNDVjNi1iYjg5LWVlOTlhZDVlN2VjYiJ9";

    const tempoCheque = 10 * 1000; // a cada 10s verifica o relógio
    const tempoAtualizacaoBI = 5 * 60 * 1000; // 5 min

    const container = document.getElementById("container");

    let mostrandoImagem = false;
    let ultimoReloadBI = 0;

    // =============================
    // VERIFICA RELÓGIO
    // =============================
    function deveMostrarImagem() {
      const agora = new Date();
      const minutos = agora.getMinutes();

      // 00 até 03 ou 30 até 33
      return (minutos >= 0 && minutos < 3) || (minutos >= 30 && minutos < 33);
    }

    // =============================
    // MOSTRAR IMAGEM
    // =============================
    function mostrarImagem() {
      if (mostrandoImagem) return;

      mostrandoImagem = true;

      container.innerHTML = "";

      const img = document.createElement("img");
      img.src = "bebagua.png";

      container.appendChild(img);

      console.log("🟢 Mostrando imagem (hidratação)");
    }

    // =============================
    // MOSTRAR / ATUALIZAR BI
    // =============================
    function mostrarBI() {
      if (!mostrandoImagem) {
        const agora = Date.now();

        // Atualiza a cada 5 minutos
        if (agora - ultimoReloadBI >= tempoAtualizacaoBI) {
          ultimoReloadBI = agora;

          container.innerHTML = "";

          const iframe = document.createElement("iframe");

          iframe.src = BI_URL + "&t=" + new Date().getTime();

          container.appendChild(iframe);

          console.log("🔵 Atualizando BI");
        }
      }
    }

    // =============================
    // LOOP PRINCIPAL
    // =============================
    function loop() {
      if (deveMostrarImagem()) {
        mostrarImagem();
      } else {
        // saiu do período da imagem
        if (mostrandoImagem) {
          mostrandoImagem = false;
          ultimoReloadBI = 0; // força reload imediato do BI
        }

        mostrarBI();
      }
    }

    // roda continuamente
    setInterval(loop, tempoCheque);

    // inicialização imediata
    loop();
  </script>
</body>
</html>
